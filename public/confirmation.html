<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirmed | Authority Distillation</title>
    <link rel="icon" type="image/svg+xml" href="/dg-favicon.svg?v=1" />
    <link rel="shortcut icon" href="/dg-favicon.svg?v=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f2ea;
        --ink: #22211e;
        --muted: #66635b;
        --line: #d1cbc0;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100dvh;
        background: radial-gradient(circle at top, #fbf8f2, var(--bg));
        color: var(--ink);
        font-family: 'IBM Plex Sans', sans-serif;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        display: grid;
        place-items: center;
        padding: 1.2rem;
      }

      .card {
        width: min(680px, 100%);
        background: rgba(255, 255, 255, 0.58);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 1.4rem;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-family: 'Fraunces', serif;
        font-size: clamp(1.6rem, 4.5vw, 2.4rem);
        font-weight: 400;
      }

      p { margin: 0.35rem 0; }
      .muted { color: var(--muted); }

      a {
        display: inline-block;
        margin-top: 1rem;
        text-decoration: none;
        border: 1px solid #2a2925;
        border-radius: 999px;
        color: #f6f4ef;
        background: #2a2925;
        padding: 0.55rem 1rem;
      }

      .small {
        margin-top: 0.9rem;
        font-size: 0.86rem;
        color: var(--muted);
      }

      .next-steps {
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid var(--line);
      }

      .next-steps h2 {
        margin: 0 0 0.55rem;
        font-family: 'IBM Plex Sans', sans-serif;
        font-size: 1rem;
        font-weight: 500;
      }

      .next-steps ul {
        margin: 0;
        padding-left: 1.1rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Confirmed.</h1>
      <p id="sessionLine">Loading your confirmation...</p>
      <p class="muted" id="metaLine"></p>
      <p class="small" id="emailLine"></p>
      <section class="next-steps" aria-label="Next steps">
        <h2>What happens next</h2>
        <ul id="prepList">
          <li>Loading preparation notes...</li>
        </ul>
      </section>
      <a href="/">Back to home</a>
    </main>

    <script>
      const sessionLine = document.getElementById('sessionLine');
      const metaLine = document.getElementById('metaLine');
      const emailLine = document.getElementById('emailLine');
      const prepList = document.getElementById('prepList');

      async function load() {
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('session_id');

        if (!sessionId) {
          sessionLine.textContent = 'Confirmation unavailable.';
          metaLine.textContent = 'Missing payment session id.';
          return;
        }

        try {
          const sessionRes = await fetch(`/api/checkout-session/${encodeURIComponent(sessionId)}`);

          if (sessionRes.ok) {
            const s = await sessionRes.json();
            const paid = s.payment_status === 'paid';
            const amount = `£${((s.amount_total || 0) / 100).toFixed(2)}`;
            const bookedTime = s.booking?.bookingLabel || s.booking?.bookingTime || 'Not yet selected';
            const firstName = (s.customer_name || '').trim().split(/\s+/)[0];

            sessionLine.textContent = paid
              ? `${firstName ? `${firstName}, ` : ''}your Authority Distillation is secured.`
              : 'Payment is not complete yet.';
            metaLine.textContent = `Paid: ${amount} | Session time: ${bookedTime}`;
            emailLine.textContent = s.customer_email
              ? `Confirmation is tied to ${s.customer_email}.`
              : 'Confirmation recorded. We will follow up by email.';

            prepList.innerHTML = '';
            (s.preparation_checklist || []).forEach((item) => {
              const li = document.createElement('li');
              li.textContent = item;
              prepList.appendChild(li);
            });
          } else {
            sessionLine.textContent = 'Your confirmation details are not available yet.';
            prepList.innerHTML = '<li>We will send follow-up details manually.</li>';
          }
        } catch (_err) {
          sessionLine.textContent = 'Payment and booking recorded. We will follow up by email.';
          prepList.innerHTML = '<li>Bring one concrete articulation problem to the session.</li>';
        }
      }

      load();
    </script>
  </body>
</html>
