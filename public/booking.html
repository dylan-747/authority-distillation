<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Book Session | Authority Distillation</title>
    <link rel="icon" type="image/svg+xml" href="/dg-favicon.svg?v=2" />
    <link rel="shortcut icon" href="/dg-favicon.svg?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f4f0e7;
        --ink: #1f211f;
        --muted: #62665f;
        --line: #c5c1b8;
        --accent: #1f211f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #fbf8f1, var(--bg));
        color: var(--ink);
        font-family: 'IBM Plex Sans', sans-serif;
        padding: 1.1rem;
      }

      main {
        width: min(720px, 100%);
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        padding: 2rem 0;
      }

      .kicker {
        margin: 0 0 0.8rem;
        color: var(--muted);
        font-size: 0.76rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 12ch;
        font-family: 'Fraunces', serif;
        font-size: clamp(2rem, 9vw, 4rem);
        font-weight: 400;
        line-height: 1;
      }

      p {
        max-width: 40rem;
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        margin-top: 1rem;
        border: 1px solid var(--accent);
        border-radius: 999px;
        background: var(--accent);
        color: #f8f4ed;
        padding: 0.72rem 1.05rem;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="kicker">Booking</p>
      <h1>Let’s arrange the session.</h1>
      <p>
        Email me with your availability this week and I'll arrange the 90-minute session directly.
      </p>
      <a
        href="mailto:dylan.galloway@proton.me?subject=Authority%20Distillation%20booking&body=Hi%20Dylan%2C%0A%0AI%20want%20to%20book%20the%20%C2%A3450%20Authority%20Distillation%20session.%0A%0AMy%20availability%20this%20week%3A%0A"
      >
        Book via email
      </a>
    </main>
  </body>
</html>
